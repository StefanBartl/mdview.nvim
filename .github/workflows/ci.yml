# .github/workflows/ci.yml
# CI pipeline for mdview.nvim
# - Rust: cargo tests (incl. XSS-neutralization checks) + wasm-pack build,
#   shared with the Node job via an artifact
# - Node/TypeScript: install, lint, type-check, test, build client
# - Go: vet, build, test the relay server
# - Lua: luacheck + optional busted unit tests
# - Release (tag pushes only): cross-compile the relay server, package the
#   client bundle, publish both to a GitHub Release for mdview.nvim's
#   install.lua to download

name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Rust / WASM render module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/wasm-render/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/wasm-render/Cargo.lock') }}

      - name: Run cargo tests (incl. XSS-neutralization checks)
        working-directory: native/wasm-render
        run: cargo test

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        working-directory: native/wasm-render
        run: wasm-pack build --target web --out-dir ../../src/client/wasm-render

      - name: Upload WASM render module
        uses: actions/upload-artifact@v4
        with:
          name: wasm-render-pkg
          path: src/client/wasm-render

  node:
    name: Node.js / TypeScript
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The WASM render module (built by the rust job) must be present before
      # type-checking and unit tests: src/client/main.ts imports it, and it's a
      # gitignored build artifact, so without it tsc/vitest fail with TS2307.
      - name: Download WASM render module
        uses: actions/download-artifact@v4
        with:
          name: wasm-render-pkg
          path: src/client/wasm-render

      - name: Lint (TypeScript / JS)
        run: npm run lint

      - name: Type-check client
        run: npm run check:types

      - name: Run unit tests
        run: npm test

      - name: Build client
        run: npm run build:client

  go:
    name: Go relay server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: native/server/go.mod

      - name: Vet
        working-directory: native/server
        run: go vet ./...

      - name: Build
        working-directory: native/server
        run: go build ./...

      - name: Test (incl. auth/origin/room-isolation checks)
        working-directory: native/server
        run: go test ./...

  lua:
    name: Lua / Neovim quick checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Lua 5.3 + headers, luarocks)
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 liblua5.3-dev luarocks git build-essential

      # Install a recent Neovim from the official release, not apt (which ships
      # an old version): the headless specs use APIs like nvim_set_option_value
      # (0.10+), and this also matches what real users run.
      - name: Install Neovim (stable release)
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          mkdir -p "$HOME/nvim" && tar xzf nvim.tar.gz -C "$HOME/nvim" --strip-components=1
          echo "$HOME/nvim/bin" >> "$GITHUB_PATH"

      - name: Show Neovim version
        run: nvim --version | head -1

      # mdview.nvim now depends on lib.nvim at runtime (see README's Installation
      # section). luacheck is purely static and doesn't need it resolvable, and
      # the busted step below only runs a trivial standalone assertion today —
      # but any future busted spec that exercises real mdview modules will need
      # both lib.nvim and a `vim` global shim (busted doesn't run inside
      # Neovim). Cloning it here now so that groundwork is in place.
      - name: Clone lib.nvim (runtime dependency, needed to resolve require("lib.nvim...."))
        uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: .deps/lib.nvim

      - name: Install luacheck and busted via luarocks locally
        run: |
          luarocks install --lua-version=5.3 --local luacheck
          luarocks install --lua-version=5.3 --local busted

      - name: Add local luarocks bin to PATH
        run: echo "${HOME}/.luarocks/bin" >> $GITHUB_PATH

      - name: Run luacheck on Lua sources
        run: luacheck lua/mdview --no-color

      - name: Run Lua unit tests with busted
        # Only pure-Lua specs (no `vim` global) run here; module paths come from
        # the repo-root .busted config's lpath. Specs that need the Neovim API
        # belong in the headless-nvim suite below instead.
        run: busted tests/lua

      - name: Run headless-nvim specs (real Neovim API)
        # Specs under tests/nvim/ exercise vim-dependent modules; the harness
        # exits non-zero (via :cq) if any assertion fails.
        run: nvim --headless -u NONE -i NONE --cmd "set rtp+=.,.deps/lib.nvim" -c "luafile tests/nvim/harness.lua" -c "qa!"

  release:
    name: Release (tag push only)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust, node, go, lua]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: native/server/go.mod

      - name: Cross-compile mdview-server binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=publish --config .goreleaser.yml
          workdir: native/server

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci

      - name: Build client bundle (WASM + HTML/JS)
        run: npm run build

      - name: Package client bundle
        run: tar -czf mdview-client.tar.gz -C dist/client .

      - name: Stage release assets under their public download names
        # GoReleaser's local "binary" format archives land in per-target
        # subdirectories (e.g. .goreleaser-dist/mdview-server_linux_amd64_v1/mdview-server)
        # named differently from the final asset name it uses when actually
        # publishing. artifacts.json has the authoritative name -> path
        # mapping (entries with extra.Format == "binary"); use that instead
        # of guessing paths, so install.lua's downloads always match exactly
        # what checksums.txt and the release assets are named.
        run: |
          mkdir -p release-assets
          jq -r '.[] | select(.extra.Format == "binary") | "\(.path)\t\(.name)"' \
            native/server/.goreleaser-dist/artifacts.json |
          while IFS=$'\t' read -r path name; do
            cp "$path" "release-assets/$name"
          done
          cp native/server/.goreleaser-dist/checksums.txt release-assets/checksums.txt
          cp mdview-client.tar.gz release-assets/mdview-client.tar.gz

      - name: Append client bundle checksum to the binaries' checksums.txt
        working-directory: release-assets
        run: sha256sum mdview-client.tar.gz >> checksums.txt

      - name: Publish GitHub release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
