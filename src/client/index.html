<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>mdview.nvim - dev</title>
    <style>
      /* #mdview-root is the scroll viewport (not the page body) so
         main.ts's scroll-sync ping (container.scrollTop = ...) has
         something to actually scroll — without height+overflow here it's a
         no-op div that just grows with its content. */
      html, body {
        margin: 0;
        height: 100%;
      }
      #mdview-root {
        height: 100vh;
        overflow-y: auto;
        box-sizing: border-box;
        padding: 1rem 2rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="mdview-root">mdview loading…</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
