<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>mdview.nvim</title>
    <style>
      /* Only the scroll-viewport mechanics live here; the visual theme
         (colors, typography, GitHub-like markdown styling) is imported by
         main.ts from ./themes/<name>.css so it can be swapped per ?theme=.
         #mdview-root must be the scroll viewport (fixed height + overflow)
         so main.ts's scroll-sync ping (container.scrollTop = ...) has
         something to actually scroll — otherwise it's a no-op div that just
         grows with its content. */
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #mdview-root {
        height: 100vh;
        overflow-y: auto;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="mdview-root">mdview loading…</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
